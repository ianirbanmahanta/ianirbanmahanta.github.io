            const fetchGemini = async (prompt, systemPrompt) => {
                let retries = 0;
                const maxRetries = 5;
                const delays = [1000, 2000, 4000, 8000, 16000];

                while (retries < maxRetries) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=AIzaSyCMe087hVXtRljBquqpZ-aBplxZb0s3p7Q`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] }
                            })
                        });

                        if (!response.ok) throw new Error('API request failed');

                        const data = await response.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text;
                    } catch (error) {
                        retries++;
                        if (retries === maxRetries) throw error;
                        await new Promise(res => setTimeout(res, delays[retries - 1]));
                    }
                }
            };

            const generateProjectIdea = async (skillName) => {

                setProjectAiLoading(true);
                setProjectAiResponse(null);

                try {
                    const result = await fetchGemini(userPrompt, systemPrompt);
                    if (result) {
                        setProjectAiResponse({ skill: skillName, text: result });
                    } else {
                        throw new Error("Empty response");
                    }
                } catch (e) {
                    setProjectAiResponse({ skill: skillName, text: "Unable to reach the AI mentor at the moment. Please try again in a few seconds." });

                    setProjectAiLoading(false);
                }

                                <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full h-px bg-gradient-to-r from-transparent via-red-900 to-transparent"></div>
                                <h2 className="text-5xl md:text-7xl font-black text-white mb-8 tracking-tighter">Ready to <span className="text-red-700">Visualize</span> Your Future?</h2>
                                <p className="text-gray-500 max-w-xl mx-auto mb-12">I'm currently open to contribute in projects and full-time data analyst roles in 2026.</p>
                                <div className="flex flex-wrap justify-center gap-4">
                                    {/* <a href="mailto:shubhjeetpaul@gmail.com" className="px-10 py-5 bg-red-700 hover:bg-red-800 text-white rounded-2xl font-bold transition-all">Email Me</a> */}
                                    <button onClick={() => setIsModalOpen(true)} className="px-10 py-5 bg-red-700 hover:bg-red-800 text-white rounded-2xl font-bold transition-all">Let's Connect</button>
                                </div>
                                <div className="mt-16 flex justify-center gap-8 text-gray-500">
                                    <a href="https://linkedin.com/in/shubhjeet-paul" className="hover:text-red-500 transition-colors">LinkedIn</a>
                                    <a href="https://github.com/shubhjeet-paul" className="hover:text-red-500 transition-colors">GitHub</a>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="py-16 border-t border-white/5 text-center">
                        <div className="flex justify-center gap-6 mb-8 text-gray-400">
                            <a href="https://linkedin.com/in/shubhjeet-paul" className="hover:text-red-500 transition-colors" target="_blank"><Icon name="linkedin" /></a>
                            <a href="https://github.com/shubh0924" className="hover:text-red-500 transition-colors" target="_blank"><Icon name="github" /></a>
                            <a href="mailto:shubhjeetpaul@gmail.com" className="hover:text-red-500 transition-colors" target="_blank"><Icon name="mail" /></a>
                        </div>
                        <p className="text-[10px] font-bold uppercase tracking-[0.3em] text-gray-700">Built with ❤️ • 2026 Anirban Mahanta</p>
                    </footer>

                    {/* Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 backdrop-blur-xl">
                            <div className="absolute inset-0 bg-black/60" onClick={() => setIsModalOpen(false)}></div>
                            <div className="relative w-full max-w-lg bg-[#111] border border-red-900/30 rounded-[2.5rem] p-10 animate-slide-up shadow-2xl">
                                <button onClick={() => setIsModalOpen(false)} className="absolute top-8 right-8 text-gray-500 hover:text-white"><Icon name="x" size={24} /></button>
                                {formStatus === 'success' ? (
                                    <div className="text-center py-10 space-y-4">
                                        <Icon name="check-circle" size={56} className="text-green-500 mx-auto" />
                                        <h3 className="text-2xl font-bold text-white">Message Sent!</h3>
                                        <p className="text-gray-400">Thanks for reaching out, Shubhjeet will respond shortly.</p>
                                    </div>
                                ) : (
                                    <>
                                        <h3 className="text-3xl font-bold text-white mb-2">Let's <span className="text-red-700">Collab</span></h3>
                                        <p className="text-gray-500 text-sm mb-8">Discuss a project or a potential role.</p>
                                        <form ref={formRef} onSubmit={handleSubmit} className="space-y-4">
                                            <input required type="text" placeholder="Full Name" name="from_name" className="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-white outline-none focus:border-red-700" />
                                            <input required type="email" placeholder="Email Address" name="reply_to" className="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-white outline-none focus:border-red-700" />
                                            <textarea required rows="4" placeholder="How can I help you?" name="message" className="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-white outline-none focus:border-red-700 resize-none"></textarea>
                                            <button type="submit" className="w-full py-5 bg-red-700 hover:bg-red-800 text-white rounded-xl font-bold transition-all transform active:scale-95">
                                                {formStatus === 'sending' ? 'Delivering...' : 'Send Inquiry'}
                                            </button>
                                        </form>
                                    </>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
